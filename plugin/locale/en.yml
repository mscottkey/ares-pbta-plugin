    xp_gained: "Mark XP. (%{total} total)"
    doom_increased: "The dungeon noticed. Doom advances to %{level}."
    doom_alert: "%{room} goes on ALERT. 7-9 results now deal Stress."
    doom_hostile: "%{room} turns HOSTILE. Environmental threats incoming."
    doom_lethal: "%{room} is LETHAL. Just being here requires a roll."
    stress_taken: "%{name} takes %{amount} Stress. (%{total}/%{max})"
